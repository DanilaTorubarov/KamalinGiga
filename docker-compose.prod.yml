version: "3.9"

services:
  backend:
    build: ./backend
    container_name: backend
    env_file:
      - .env
    networks:
      - appnet

  nginx:
    image: nginx:1.25
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./html:/usr/share/nginx/html:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - appnet

networks:
  appnet:
    driver: bridge
